apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ecommerce-gateway
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-and-api-route
  namespace: default
spec:
  parentRefs:
  - name: ecommerce-gateway
  rules:
  # Any request starting with /api goes to your custom Node.js api-gateway
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-gateway
      port: 3000
  # Everything else goes to the React frontend UI
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-ui
      port: 80
